<!DOCTYPE html>
<html lang="ru">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #1a1a2e; touch-action: manipulation; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #menuScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; overflow-y: auto; }

    #settingsPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a1e; border: 3px solid #4dc9f6; border-radius: 20px; padding: 25px; z-index: 9999; color: white; text-align: center; display: none; min-width: 300px; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
    #settingsPanel h3 { color: #4dc9f6; margin-bottom: 20px; font-size: 20px; }
    #settingsPanel select, #settingsPanel input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: #1a1a2e; color: white; font-family: 'Courier New', monospace; font-size: 14px; }

    #settingsPanel button:hover { background: #7dd9ff; }

    #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; font-size: 14px; pointer-events: none; z-index: 10; display: none; }
    #waterOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 100, 180, 0.4); pointer-events: none; z-index: 5; opacity: 0; }
    #mobileControls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; display: none; }
    .ctrl-row { display: flex; gap: 5px; justify-content: center; margin: 3px 0; }
    .ctrl-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 15px; color: white; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .ctrl-btn:active { background: rgba(255,255,255,0.5); }
    .ctrl-btn.wide { width: 110px; font-size: 16px; }
    #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; opacity: 0; pointer-events: none; z-index: 20; display: none; }
  </style>
</head>
<body>
  <div id="menuScreen"><h1>⛏️ <span id="menuTitle">Minecraft 3D</span></h1><div class="subtitle" id="menuSubtitle">Остров 16×16 — Альфа 0.4</div><div class="device-buttons"><button class="menu-btn" id="pcBtn"><span class="icon">🖥️</span><span id="pcBtnText">ПК (WASD + Мышь)</span></button><button class="menu-btn" id="mobileBtn"><span class="icon">📱</span><span id="mobileBtnText">Телефон (Кнопки)</span></button></div></div>
  <button id="settingsBtn" onclick="window.toggleSettingsPanel()">⚙️ <span id="settingsBtnText">Настройки</span></button>
  <div id="settingsPanel"><h3 id="settingsTitle">⚙️ Настройки</h3><div class="setting-group"><label id="langLabel">🌐 Язык</label><select id="langSelect" onchange="window.applySettings()"><option value="ru">Русский</option><option value="en">English</option><option value="de">Deutsch</option></select></div><div class="setting-group"><label id="sensLabel">🎯 Чувствительность: <span id="sensValue">50%</span></label><input type="range" id="sensRange" min="10" max="100" value="50" oninput="window.applySettings()"></div><div class="setting-group"><label id="graphicsLabel">🎨 Графика</label><select id="graphicsSelect" onchange="window.applySettings()"><option value="high" id="gfxHigh">Низкая</option><option value="low" id="gfxLow" selected>Нормальная</option><option value="normal" id="gfxNormal">Высокая</option></select></div><button onclick="window.toggleSettingsPanel()" id="closeBtn">Закрыть</button></div>
  <div id="waterOverlay"></div><div id="info"><h2>⛏️ <span id="infoTitle">Остров 16x16</span></h2><p id="versionText">Альфа 0.4</p></div><div id="crosshair">✚</div>
  <div id="mobileControls"><div class="ctrl-row"><div class="ctrl-btn" data-key="w">▲</div></div><div class="ctrl-row"><div class="ctrl-btn" data-key="a">◀</div><div class="ctrl-btn" data-key="s">▼</div><div class="ctrl-btn" data-key="d">▶</div></div><div class="ctrl-row"><div class="ctrl-btn wide" data-key="space" id="jumpBtn">Прыжок</div><div class="ctrl-btn wide" data-key="shift" id="runBtn">Красться</div></div></div>
  <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.126.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/" } }</script>
  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    
    const GS = { language: 'ru', sensitivity: 50, graphics: 'low', sensMultiplier: 1 };
    window.GS = GS;
    window.gameRenderer = null;
    window.gameSun = null;
    let mouseHandler = null;
    let dayTime = 0;
    const DAY_SPEED = 0.000833; // 20 минут на полный цикл
    
    const texts = { 
      ru: { title:'Minecraft 3D', infoTitle:'Остров 16x16', pcBtn:'ПК (WASD + Мышь)', mobileBtn:'Телефон (Кнопки)', settingsBtn:'Настройки', settingsTitle:'⚙️ Настройки', langLabel:'🌐 Язык', sensLabel:'🎯 Чувствительность', graphicsLabel:'🎨 Графика', gfxLow:'Нормальная', gfxNormal:'Высокая', gfxHigh:'Низкая', closeBtn:'Закрыть', jump:'Прыжок', run:'Красться', version:'Альфа 0.4', subtitle:'Остров 16×16 — Альфа 0.4' }, 
      en: { title:'Minecraft 3D', infoTitle:'16x16 Island', pcBtn:'PC (WASD + Mouse)', mobileBtn:'Phone (Buttons)', settingsBtn:'Settings', settingsTitle:'⚙️ Settings', langLabel:'🌐 Language', sensLabel:'🎯 Sensitivity', graphicsLabel:'🎨 Graphics', gfxLow:'Normal', gfxNormal:'High', gfxHigh:'Low', closeBtn:'Close', jump:'Jump', run:'Sneak', version:'Alpha 0.4', subtitle:'16×16 Island — Alpha 0.4' }, 
      de: { title:'Minecraft 3D', infoTitle:'16x16 Insel', pcBtn:'PC (WASD + Maus)', mobileBtn:'Handy (Tasten)', settingsBtn:'Einstellungen', settingsTitle:'⚙️ Einstellungen', langLabel:'🌐 Sprache', sensLabel:'🎯 Empfindlichkeit', graphicsLabel:'🎨 Grafik', gfxLow:'Normal', gfxNormal:'Hoch', gfxHigh:'Niedrig', closeBtn:'Schließen', jump:'Springen', run:'Schleichen', version:'Alpha 0.4', subtitle:'16×16 Insel — Alpha 0.4' } 
    };
    
    function updateAllText() { const t = texts[GS.language]; document.getElementById('menuTitle').textContent=t.title; document.getElementById('infoTitle').textContent=t.infoTitle; document.getElementById('pcBtnText').textContent=t.pcBtn; document.getElementById('mobileBtnText').textContent=t.mobileBtn; document.getElementById('settingsBtnText').textContent=t.settingsBtn; document.getElementById('settingsTitle').textContent=t.settingsTitle; document.getElementById('langLabel').textContent=t.langLabel; document.getElementById('sensLabel').innerHTML=t.sensLabel+': <span id="sensValue">'+GS.sensitivity+'%</span>'; document.getElementById('graphicsLabel').textContent=t.graphicsLabel; document.getElementById('gfxLow').textContent=t.gfxLow; document.getElementById('gfxNormal').textContent=t.gfxNormal; document.getElementById('gfxHigh').textContent=t.gfxHigh; document.getElementById('closeBtn').textContent=t.closeBtn; document.getElementById('versionText').textContent=t.version; document.getElementById('menuSubtitle').textContent=t.subtitle; document.getElementById('jumpBtn').textContent=t.jump; document.getElementById('runBtn').textContent=t.run; }
    
    window.toggleSettingsPanel = function() { const p=document.getElementById('settingsPanel'); if(p.style.display==='block'){p.style.display='none';}else{document.getElementById('langSelect').value=GS.language;document.getElementById('sensRange').value=GS.sensitivity;document.getElementById('graphicsSelect').value=GS.graphics;p.style.display='block';updateAllText();} };
    window.applySettings = function() { GS.language=document.getElementById('langSelect').value; GS.sensitivity=parseInt(document.getElementById('sensRange').value); GS.sensMultiplier=(GS.sensitivity/100)*1.5; document.getElementById('sensValue').textContent=GS.sensitivity+'%'; const ng=document.getElementById('graphicsSelect').value; if(window.gameRenderer&&window.gameSun&&ng!==GS.graphics){GS.graphics=ng;if(ng==='high'){window.gameSun.shadow.mapSize.set(2048,2048);window.gameSun.intensity=1.4;}else if(ng==='normal'){window.gameSun.shadow.mapSize.set(1024,1024);window.gameSun.intensity=1.2;}else{window.gameSun.shadow.mapSize.set(512,512);window.gameSun.intensity=1.0;}window.gameSun.shadow.needsUpdate=true;}else{GS.graphics=ng;}updateAllText(); };
    window.startGame = function(type) { document.getElementById('menuScreen').style.display='none'; document.getElementById('info').style.display='block'; document.getElementById('settingsBtn').style.display='block'; if(type==='mobile'){document.getElementById('mobileControls').style.display='block';document.getElementById('crosshair').style.display='block';document.getElementById('crosshair').style.opacity='0.8';} updateAllText(); initGame(type); };
    document.getElementById('pcBtn').addEventListener('click',()=>window.startGame('pc'));
    document.getElementById('mobileBtn').addEventListener('click',()=>window.startGame('mobile'));
    
    function getSkyColor() {
      const r1=0.53,g1=0.81,b1=0.92;
      const r2=0.1,g2=0.15,b2=0.35;
      const t = Math.sin(dayTime * Math.PI * 2) * 0.5 + 0.5;
      return new THREE.Color(r1*t+r2*(1-t), g1*t+g2*(1-t), b1*t+b2*(1-t));
    }
    
    function getAmbientIntensity() { return 0.35 + Math.sin(dayTime * Math.PI * 2) * 0.35; }
    function getSunIntensity() { return Math.max(0.2, Math.sin(dayTime * Math.PI * 2) * 1.2); }
    
    function createPixelTexture(color) {
      const canvas = document.createElement('canvas');
      canvas.width = 16; canvas.height = 16;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, 16, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(2, 2, 4, 4); ctx.fillRect(10, 4, 2, 2);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(12, 0, 4, 4); ctx.fillRect(4, 10, 3, 3);
      const tex = new THREE.CanvasTexture(canvas);
      tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
      return tex;
    }
    
    function initGame(deviceType) {
      const PW=0.6,PH=1.7,EYE=1.6,GRAVITY=20,JUMP=8.5,WALK=5.5,SNEAK=2.5,WATER_Y=2.0;
      const scene=new THREE.Scene(); scene.background = getSkyColor(); scene.fog = new THREE.Fog(getSkyColor(), 40, 85);
      const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
      const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);window.gameRenderer=renderer;
      const overlay=document.getElementById('waterOverlay');
      const ctrl=new PointerLockControls(cam,renderer.domElement);ctrl.getObject().position.set(8,5.6,8);scene.add(ctrl.getObject());
      if(mouseHandler)document.removeEventListener('mousemove',mouseHandler);
      mouseHandler=(e)=>{if(ctrl.isLocked&&deviceType==='pc'){const mx=e.movementX||0,my=e.movementY||0;const euler=new THREE.Euler(0,0,0,'YXZ');euler.setFromQuaternion(ctrl.getObject().quaternion);euler.y-=mx*0.002*GS.sensMultiplier;euler.x-=my*0.002*GS.sensMultiplier;euler.x=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,euler.x));ctrl.getObject().quaternion.setFromEuler(euler);}};
      document.addEventListener('mousemove',mouseHandler);
      if(deviceType==='pc'){renderer.domElement.addEventListener('click',()=>{if(!ctrl.isLocked&&document.getElementById('settingsPanel').style.display!=='block')ctrl.lock();});ctrl.addEventListener('lock',()=>{document.getElementById('crosshair').style.display='block';document.getElementById('crosshair').style.opacity='0.8';});document.getElementById('crosshair').style.display='block';}
      const K={w:0,a:0,s:0,d:0,sp:0,sh:0};let inWater=false,onGround=false,jumpCd=false,velX=0,velY=0,velZ=0,justJumpedOut=false;
      document.addEventListener('keydown',(e)=>{if(deviceType!=='pc')return;if(e.code==='KeyW')K.w=1;if(e.code==='KeyS')K.s=1;if(e.code==='KeyA')K.a=1;if(e.code==='KeyD')K.d=1;if(e.code==='Space')K.sp=1;if(e.code==='ShiftLeft'||e.code==='ShiftRight')K.sh=1;});
      document.addEventListener('keyup',(e)=>{if(deviceType!=='pc')return;if(e.code==='KeyW')K.w=0;if(e.code==='KeyS')K.s=0;if(e.code==='KeyA')K.a=0;if(e.code==='KeyD')K.d=0;if(e.code==='Space'){K.sp=0;jumpCd=false;}if(e.code==='ShiftLeft'||e.code==='ShiftRight')K.sh=0;});
      if(deviceType==='mobile'){document.querySelectorAll('.ctrl-btn').forEach(btn=>{const key=btn.dataset.key;btn.addEventListener('pointerdown',(e)=>{e.preventDefault();if(key==='w')K.w=1;if(key==='s')K.s=1;if(key==='a')K.a=1;if(key==='d')K.d=1;if(key==='space')K.sp=1;if(key==='shift')K.sh=1;});btn.addEventListener('pointerup',(e)=>{e.preventDefault();if(key==='w')K.w=0;if(key==='s')K.s=0;if(key==='a')K.a=0;if(key==='d')K.d=0;if(key==='space'){K.sp=0;jumpCd=false;}if(key==='shift')K.sh=0;});btn.addEventListener('pointerleave',(e)=>{if(key==='w')K.w=0;if(key==='s')K.s=0;if(key==='a')K.a=0;if(key==='d')K.d=0;if(key==='space'){K.sp=0;jumpCd=false;}if(key==='shift')K.sh=0;});});let tsx=0,tsy=0;const euler=new THREE.Euler(0,0,0,'YXZ');renderer.domElement.addEventListener('touchstart',(e)=>{if(e.target===renderer.domElement&&e.touches.length===1){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;}});renderer.domElement.addEventListener('touchmove',(e)=>{if(e.target===renderer.domElement&&e.touches.length===1){e.preventDefault();const dx=e.touches[0].clientX-tsx,dy=e.touches[0].clientY-tsy;euler.setFromQuaternion(ctrl.getObject().quaternion);euler.y-=dx*0.005*GS.sensMultiplier;euler.x-=dy*0.005*GS.sensMultiplier;euler.x=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,euler.x));ctrl.getObject().quaternion.setFromEuler(euler);tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;}},{passive:false});}
      
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); scene.add(ambientLight);
      const sun = new THREE.DirectionalLight(0xfff5e6, 1.2); sun.position.set(40,55,40); sun.castShadow=true;
      sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.near=0.5; sun.shadow.camera.far=150;
      sun.shadow.camera.left=-40; sun.shadow.camera.right=40; sun.shadow.camera.top=40; sun.shadow.camera.bottom=-20;
      scene.add(sun); window.gameSun = sun; window.gameAmbient = ambientLight; window.applySettings();
      
      const sunTex = createPixelTexture('#ffdd00');
      const sunMesh = new THREE.Mesh(new THREE.PlaneGeometry(4,4), new THREE.MeshBasicMaterial({map:sunTex, side:THREE.DoubleSide}));
      sunMesh.position.set(40,55,40); scene.add(sunMesh);
      
      const moonTex = createPixelTexture('#eeeeff');
      const moonMesh = new THREE.Mesh(new THREE.PlaneGeometry(3,3), new THREE.MeshBasicMaterial({map:moonTex, side:THREE.DoubleSide}));
      moonMesh.position.set(-40,-55,-40); scene.add(moonMesh);
      
      const starsGeo = new THREE.BufferGeometry();
      const starsPos = new Float32Array(900);
      for (let i=0;i<300;i++){starsPos[i*3]=(Math.random()-0.5)*80;starsPos[i*3+1]=Math.random()*30+15;starsPos[i*3+2]=(Math.random()-0.5)*80;}
      starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
      const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:0.25, transparent:true, opacity:0}));
      scene.add(stars);

      function tex(b,d,l,s=16){const c=document.createElement('canvas');c.width=c.height=s;const ctx=c.getContext('2d');ctx.fillStyle=b;ctx.fillRect(0,0,s,s);for(let i=0;i<s*2;i++){ctx.fillStyle=Math.random()>0.5?d:l;ctx.fillRect(Math.floor(Math.random()*s),Math.floor(Math.random()*s),2,2);}ctx.fillStyle=d;ctx.fillRect(0,0,s,2);ctx.fillRect(0,0,2,s);ctx.fillStyle=l;ctx.fillRect(s-2,0,2,s);ctx.fillRect(0,s-2,s,2);const t=new THREE.CanvasTexture(c);t.magFilter=t.minFilter=THREE.NearestFilter;return t;}
      function mat(b,d,l){return new THREE.MeshStandardMaterial({map:tex(b,d,l),roughness:0.85});}
      const M={grass:mat('#7c9c4c','#5a7a3a','#9cc86c'),dirt:mat('#8b5a2b','#6b4226','#a0724a'),stone:mat('#7f8c8d','#5a6a6b','#9ea8a9'),sand:mat('#e8d5a3','#c4b07c','#f5e6c4'),wood:mat('#8b6b4d','#6b4f35','#a88b6a'),leaves:new THREE.MeshStandardMaterial({map:tex('#2d5a27','#1a3d15','#3d7a35'),roughness:0.7,transparent:true,opacity:0.85}),ladder:mat('#c49a3c','#a0782a','#dbb85c'),water:new THREE.MeshStandardMaterial({color:'#3a6b8c',transparent:true,opacity:0.7,roughness:0.1})};
      const blocks=new Map();function set(x,y,z,m){const key=`${x},${y},${z}`;if(blocks.has(key))return;const mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),m);mesh.position.set(x,y,z);mesh.castShadow=mesh.receiveShadow=true;scene.add(mesh);blocks.set(key,{x,y,z});}
      for(let ix=-8;ix<8;ix++)for(let iz=-8;iz<8;iz++){const d=Math.sqrt(ix*ix+iz*iz);if(d>7.8)continue;set(ix,0,iz,M.stone);set(ix,1,iz,d>6.5?M.dirt:M.stone);set(ix,2,iz,M.dirt);if(d<6.8)set(ix,3,iz,M.dirt);if(d<7.2)set(ix,4,iz,M.grass);if(d<3.5){set(ix,5,iz,M.grass);}}
      function tree(x,z,y){set(x,y+1,z,M.wood);set(x,y+2,z,M.wood);set(x,y+3,z,M.wood);[[0,4,0],[1,4,0],[-1,4,0],[0,4,1],[0,4,-1],[1,4,1],[-1,4,-1],[1,4,-1],[-1,4,1],[0,5,0],[1,5,0],[-1,5,0],[0,5,1],[0,5,-1],[0,6,0]].forEach(([dx,dy,dz])=>set(x+dx,y+dy,z+dz,M.leaves));}
      tree(4,4,4);tree(-4,4,4);tree(4,-4,4);tree(-4,-4,4);tree(0,5,4);tree(5,0,4);tree(-5,0,4);tree(0,-5,4);
      for(let ix=-8;ix<8;ix++)for(let iz=-8;iz<8;iz++){const d=Math.sqrt(ix*ix+iz*iz);if(d>7.0&&d<=7.9){if(!blocks.has(`${ix},4,${iz}`)&&blocks.has(`${ix},3,${iz}`))set(ix,4,iz,M.sand);if(!blocks.has(`${ix},3,${iz}`)&&blocks.has(`${ix},2,${iz}`)&&d>7.4)set(ix,3,iz,M.sand);}}
      for(let i=0;i<9;i++){const z=7+i*0.7,y=4-i*0.5,bz=Math.round(z),by=Math.round(y);set(0,by,bz,M.ladder);set(1,by,bz,M.ladder);set(-1,by,bz,M.ladder);if(by>=1){set(2,by+1,bz,M.wood);set(-2,by+1,bz,M.wood);}}
      set(0,0,13,M.ladder);set(1,0,13,M.ladder);set(-1,0,13,M.ladder);
      const waterPlane=new THREE.Mesh(new THREE.PlaneGeometry(40,40),M.water);waterPlane.rotation.x=-Math.PI/2;waterPlane.position.y=WATER_Y;waterPlane.receiveShadow=true;scene.add(waterPlane);
      function checkWater(fx,fy,fz){const midY=fy+PH*0.35;if(midY<WATER_Y)return!blocks.has(`${Math.round(fx)},${Math.floor(WATER_Y)},${Math.round(fz)}`);return false;}
